workflows:
  sample-workflow:
    name: Sample Workflow
    max_build_duration: 120
    instance_type: windows_x2

    scripts:
      - name: Update Chrome
        script: |
          choco upgrade googlechrome -y --ignore-checksums

      - name: Update Chrome Driver
        script: |
          $chromePath1 = "$env:ProgramFiles\Google\Chrome\Application\chrome.exe"
          $chromePath2 = "$env:ProgramFiles(x86)\Google\Chrome\Application\chrome.exe"

          if (Test-Path $chromePath1) {
              $chromePath = $chromePath1
          } elseif (Test-Path $chromePath2) {
              $chromePath = $chromePath2
          } else {
              Write-Host "Chrome not found"
              exit 1
          }

          $CHROME_VERSION = (& $chromePath --version).Split()[2]
          $CHROME_MAJOR = $CHROME_VERSION.Split('.')[0]

          choco upgrade chromedriver --version=$CHROME_MAJOR -y
